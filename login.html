<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | HortaConecta</title>
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Folha de Estilo Global -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">
          <i class="fa-solid fa-seedling"></i>
          <span>HortaConecta</span>
        </div>
        <p>Desenvolvimento Sustentável e Segurança Alimentar (ODS 2)</p>
      </div>

      <!-- Alerta de Erro -->
      <div id="error-alert" class="badge badge-danger" style="display: none; width: 100%; padding: 12px; margin-bottom: 20px; border-radius: var(--radius-md); font-size: 0.85rem; justify-content: center; gap: 8px;">
        <i class="fa-solid fa-circle-exclamation"></i>
        <span id="error-message">E-mail ou senha inválidos.</span>
      </div>

      <form id="login-form">
        <div class="form-group">
          <label for="email">E-mail da Instituição / Usuário</label>
          <input type="email" id="email" class="form-control" placeholder="exemplo@horta.org" required>
        </div>

        <div class="form-group">
          <label for="password">Senha</label>
          <input type="password" id="password" class="form-control" placeholder="••••••••" required>
        </div>

        <div class="auth-options">
          <label>
            <input type="checkbox" id="remember"> Lembrar-me
          </label>
          <a href="#" id="forgot-password">Esqueceu a senha?</a>
        </div>

        <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; padding: 14px;">
          Entrar na Plataforma <i class="fa-solid fa-arrow-right"></i>
        </button>
      </form>

      <!-- Instrução de Teste (Dica UX) -->
      <div style="margin-top: 20px; padding: 12px; background-color: var(--primary-light); border: 1px solid rgba(15, 118, 110, 0.2); border-radius: var(--radius-md); font-size: 0.75rem; color: var(--primary); text-align: center; line-height: 1.4;">
        <i class="fa-solid fa-circle-info"></i> <strong>Acesso Rápido para Teste:</strong><br>
        E-mail: <code>contato@hortaconecta.org</code> / Senha: <code>senha123</code>
      </div>

      <div class="auth-footer">
        Não possui uma conta? <a href="cadastro.html">Cadastre-se aqui</a>
      </div>
    </div>
  </div>

  <!-- Banco de Dados Simulado -->
  <script src="js/data.js"></script>
  <!-- Lógica da Tela de Login -->
  <script>
    // Se o usuário já estiver logado, redireciona diretamente para o Dashboard
    if (HortaDb.getCurrentUser()) {
      window.location.href = 'dashboard.html';
    }

    const loginForm = document.getElementById('login-form');
    const errorAlert = document.getElementById('error-alert');
    const errorMessage = document.getElementById('error-message');

    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      // Buscar usuário mock correspondente
      const users = HortaDb.getUsers();
      const user = users.find(u => u.email.toLowerCase() === email.toLowerCase() && u.password === password);

      if (user) {
        // Sucesso: Salva o usuário logado e redireciona
        HortaDb.setCurrentUser(user);
        errorAlert.style.display = 'none';
        
        // Pequena animação/transição simulada antes de mudar de tela
        const submitBtn = loginForm.querySelector('button[type="submit"]');
        submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Autenticando...';
        submitBtn.disabled = true;

        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 800);
      } else {
        // Erro
        errorMessage.innerText = 'E-mail ou senha incorretos.';
        errorAlert.style.display = 'flex';
      }
    });

    // Simulação rápida para Esqueci Senha
    document.getElementById('forgot-password').addEventListener('click', (e) => {
      e.preventDefault();
      alert('Instruções de recuperação de senha enviadas para o e-mail cadastrado (Simulação).');
    });
  </script>
</body>
</html>
